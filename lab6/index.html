<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Числове Полювання</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="./lab6.css">

</head>

<body>

    <h1>ЧИСЛОВЕ <span>ПОЛЮВАННЯ</span></h1>
    <p class="subtitle">Знайди всі числа по порядку. Часу обмаль.</p>

    <!-- CONFIG -->
    <div id="config-panel">
        <div class="cfg-row">
            <label>Кількість чисел (N)</label>
            <div class="cfg-val">
                <input type="range" id="n-slider" min="9" max="36" step="1" value="16">
                <span class="num-display" id="n-val">16</span>
            </div>
        </div>
        <div class="cfg-row">
            <label>Час (секунд)</label>
            <div class="cfg-val">
                <input type="range" id="t-slider" min="20" max="120" step="5" value="45">
                <span class="num-display" id="t-val">45</span>
            </div>
        </div>
        <button id="start-btn">▶ ПОЧАТИ ГРУ</button>
    </div>

    <!-- HUD -->
    <div id="hud">
        <div class="hud-block">
            <span class="hud-label">Наступне</span>
            <div id="next-hint">шукай <span id="next-num">1</span></div>
        </div>
        <div class="hud-block" style="text-align:right">
            <span class="hud-label">Залишилось</span>
            <span class="hud-value" id="timer-display">45</span>
        </div>
    </div>

    <div id="progress-bar-wrap" style="display:none">
        <div id="progress-bar"></div>
    </div>

    <!-- GRID -->
    <div id="game-area">
        <div id="grid"></div>
    </div>

    <!-- OVERLAY -->
    <div id="overlay">
        <div class="overlay-box">
            <div class="overlay-icon" id="overlay-icon"></div>
            <div class="overlay-title" id="overlay-title"></div>
            <p class="overlay-sub" id="overlay-sub"></p>
            <button id="play-again-btn">ГРАТИ ЗНОВУ</button>
        </div>
    </div>

    <script src="./game.js"></script>
</body>

</html>
